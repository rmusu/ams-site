<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>acmOS — How the allocation engine thinks</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#070b17; --ink:#eef1fb; --dim:#8d99c4; --faint:#5f6a8f; --blue:#5b7cfa; --violet:#a78bfa;
    --amber:#ffb454; --ok:#4ade80; --bad:#f87171; --grad:linear-gradient(92deg,#7c96ff,#a78bfa,#d6b4fe); --sc:1; }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; background:var(--bg); color:var(--ink); font-family:"Inter","Segoe UI",sans-serif; overflow:hidden; }
  .num { font-variant-numeric:tabular-nums; }

  /* ---------- ambient background (real viewport, behind the stage) ---------- */
  #bgfx { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  #bgfx::before { content:""; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:46px 46px; mask-image:radial-gradient(ellipse 80% 65% at 50% 30%,#000 20%,transparent 72%); }
  .blob { position:absolute; border-radius:50%; filter:blur(95px); opacity:.4; }
  .b1 { width:46vw; height:34vh; top:-12vh; left:6vw; background:#3d63f5; animation:drift1 26s ease-in-out infinite alternate; }
  .b2 { width:38vw; height:30vh; bottom:-14vh; right:4vw; background:#7c3aed; opacity:.28; animation:drift2 31s ease-in-out infinite alternate; }
  @keyframes drift1 { to { transform:translate(9vw,6vh) scale(1.12); } }
  @keyframes drift2 { to { transform:translate(-8vw,-5vh) scale(1.08); } }

  /* ---------- poster gate (real viewport — already size-adaptive) ---------- */
  #gate { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3.4vh; z-index:50;
    background:radial-gradient(ellipse 110% 110% at 50% 0%,#131c3f 0%,var(--bg) 70%); cursor:pointer; }
  #gate .ghost { display:flex; gap:2.2vw; align-items:flex-end; height:19vh; opacity:.3; }
  #gate .gb { width:5.4vw; max-width:64px; border-radius:8px 8px 0 0; background:linear-gradient(180deg,#7c96ff,#a78bfa); position:relative; }
  #gate .gb i { position:absolute; left:0; right:0; bottom:30%; border-top:2px dashed rgba(255,180,84,.9); }
  #gate h1 { font-family:"Sora",sans-serif; font-size:clamp(15px,2.7vw,27px); font-weight:700; text-align:center; color:var(--dim); line-height:1.45; padding:0 4vw; }
  #gate h1 b { color:var(--ink); }
  #play { width:clamp(54px,9vw,86px); height:clamp(54px,9vw,86px); border-radius:50%; border:0; cursor:pointer; font-size:clamp(19px,3vw,31px); color:#0b0f1e;
    background:linear-gradient(135deg,#7c96ff,#a78bfa); box-shadow:0 0 55px rgba(124,150,255,.55); transition:transform .15s; }
  #gate:hover #play { transform:scale(1.09); }
  #gate p { color:var(--faint); font-size:clamp(10.5px,1.6vw,12.5px); }

  /* ---------- chrome (real viewport) ---------- */
  #bar { position:fixed; top:0; left:0; height:3px; background:var(--grad); width:0%; z-index:40; }
  #marks { position:fixed; top:0; left:0; right:0; height:3px; z-index:39; }
  #marks i { position:absolute; top:0; width:2px; height:3px; background:rgba(255,255,255,.25); }
  #hud { position:fixed; bottom:8px; right:8px; z-index:40; display:flex; gap:6px; opacity:.85; }
  #hud button { background:rgba(11,17,34,.7); border:1px solid rgba(255,255,255,.22); color:var(--ink);
    border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; font-family:inherit; backdrop-filter:blur(6px); }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:45; }
  #cursor { position:fixed; width:22px; height:22px; z-index:38; pointer-events:none; opacity:0;
    transition:all .9s cubic-bezier(.4,.1,.3,1); filter:drop-shadow(0 2px 6px rgba(0,0,0,.6)); }

  /* ---------- THE STAGE: fixed 1120×700 composition, scaled like a video ---------- */
  #viewport { position:fixed; inset:0; z-index:1; overflow:hidden; }
  #film { position:absolute; left:50%; top:50%; width:1120px; height:700px; margin:-350px 0 0 -560px;
    transform:scale(var(--sc)); }
  #world { position:absolute; inset:0; width:8960px; display:flex; transition:transform 1.25s cubic-bezier(.7,0,.25,1); }
  .scene { width:1120px; height:700px; position:relative; flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:88px; }

  #cap { position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:35; max-width:940px; width:max-content;
    text-align:center; font-size:26px; color:#dbe3ff; font-weight:600; line-height:1.45;
    background:rgba(7,11,23,.68); border:1px solid rgba(255,255,255,.09); border-radius:14px; padding:12px 26px;
    backdrop-filter:blur(8px); opacity:0; transition:opacity .35s; }
  #cap.on { opacity:1; }

  .kick { font-family:"Sora",sans-serif; font-size:16px; font-weight:700; letter-spacing:.16em; color:var(--violet);
    text-transform:uppercase; margin-bottom:12px; opacity:0; transform:translateY(18px); transition:all .5s cubic-bezier(.2,.9,.3,1.1); }
  .kick.show { opacity:1; transform:none; }
  .kick::before { content:"✦ "; color:var(--amber); }
  .k { font-family:"Sora",sans-serif; font-weight:800; letter-spacing:-.01em; text-align:center; padding:0 66px; }
  .kl { display:block; font-size:54px; opacity:0; transform:translateY(30px); filter:blur(5px); }
  .kl.show { opacity:1; transform:none; filter:none; transition:all .5s cubic-bezier(.2,.9,.3,1.12); }
  .kl.g { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .kl.small { font-size:22px; font-weight:600; color:var(--dim); font-family:"Inter",sans-serif; }
  .h2 { font-family:"Sora",sans-serif; font-weight:800; font-size:40px; text-align:center; padding:0 66px;
    opacity:0; transform:translateY(26px); transition:all .5s cubic-bezier(.2,.9,.3,1.12); }
  .h2.show { opacity:1; transform:none; }
  .h2 .am { color:var(--amber); } .h2 .gr { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }

  /* ---------- S1 org cards ---------- */
  .cards { display:flex; gap:26px; justify-content:center; margin-top:30px; }
  .oc { width:288px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.16);
    border-radius:16px; padding:20px; text-align:left; opacity:0; transform:translateY(46px);
    transition:all .6s cubic-bezier(.2,.85,.3,1.1); position:relative; }
  .oc.in { opacity:1; transform:none; }
  .oc .rk { position:absolute; top:-12px; right:14px; font-size:12px; font-weight:800; letter-spacing:.1em; font-family:"Sora",sans-serif;
    background:#0b1122; border:1px solid rgba(124,150,255,.45); color:#aab9ff; border-radius:20px; padding:3px 11px; }
  .oc h4 { font-family:"Sora",sans-serif; font-size:20px; display:flex; align-items:center; gap:9px; }
  .oc h4 .dot { width:12px; height:12px; border-radius:4px; background:var(--grad); box-shadow:0 0 12px rgba(124,150,255,.7); }
  .oc .want { font-family:"Sora",sans-serif; font-weight:800; font-size:32px; margin:9px 0 2px; }
  .oc .want small { font-size:14px; color:var(--dim); font-weight:600; font-family:"Inter",sans-serif; display:block; }
  .oc .ln { font-size:14.5px; color:var(--dim); margin-top:6px; opacity:0; transition:opacity .4s; }
  .oc .ln.show { opacity:1; }
  .oc .ln b { color:var(--ink); font-weight:600; }
  #totchip { margin-top:30px; display:inline-flex; gap:14px; align-items:center; font-family:"Sora",sans-serif; font-weight:700;
    font-size:20px; background:rgba(255,180,84,.09); border:1px solid rgba(255,180,84,.4);
    color:var(--amber); border-radius:12px; padding:11px 22px; opacity:0; transform:scale(.9); transition:all .45s cubic-bezier(.2,.9,.3,1.2); }
  #totchip.in { opacity:1; transform:none; }

  /* ---------- S2 levers ---------- */
  .consider { text-align:left; font-size:22px; font-weight:600; margin-top:16px; }
  .consider > div { margin:17px 0; opacity:0; transform:translateX(-30px); transition:all .45s cubic-bezier(.2,.9,.3,1.15); display:flex; gap:14px; align-items:center; }
  .consider > div.show { opacity:1; transform:none; }
  .consider .ic { width:42px; height:42px; border-radius:11px; background:rgba(124,150,255,.13); border:1px solid rgba(124,150,255,.32);
    display:flex; align-items:center; justify-content:center; font-size:19px; flex:none; }
  .consider small { display:block; font-weight:500; color:var(--dim); font-size:17px; }

  /* ---------- S3/S4/S5 the worked example ---------- */
  .lab { display:flex; gap:56px; align-items:flex-end; margin-top:24px; }
  .bars { display:flex; gap:34px; align-items:flex-end; height:270px; }
  .bcol { width:112px; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
  .tube { position:relative; width:100%; flex:none; border:1px solid rgba(255,255,255,.16); border-radius:12px; overflow:hidden;
    background:rgba(255,255,255,.03); transition:height 1s cubic-bezier(.3,.7,.3,1); }
  .fill { position:absolute; bottom:0; left:0; right:0; height:0%; transition:height 1.4s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(124,150,255,.92),rgba(167,139,250,.6)); }
  .tup { position:absolute; left:0; right:0; bottom:0%; height:0%; transition:all 1.4s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(255,180,84,.95),rgba(255,180,84,.5)); }
  .fmark { position:absolute; left:-6%; right:-6%; border-top:2px dashed rgba(255,180,84,.85); bottom:30%; opacity:0; transition:opacity .6s; }
  .cnt { position:absolute; top:8px; left:0; right:0; text-align:center; font-family:"Sora",sans-serif; font-weight:800;
    font-size:24px; color:#dfe6ff; text-shadow:0 2px 8px rgba(0,0,0,.7); opacity:0; transition:opacity .5s; }
  .cnt small { display:block; font-size:12.5px; color:var(--dim); font-weight:600; letter-spacing:.05em; }
  .blab { text-align:center; margin-top:12px; font-family:"Sora",sans-serif; font-weight:700; font-size:19px; }
  .blab small { display:block; color:var(--dim); font-weight:500; font-size:13px; margin-top:2px; }
  .chip { margin-top:9px; font-size:14px; font-weight:700; border-radius:8px; padding:4px 10px;
    opacity:0; transform:scale(.75); transition:all .4s cubic-bezier(.2,.9,.3,1.3); white-space:nowrap; }
  .chip.show { opacity:1; transform:none; }
  .chip.okc { color:var(--ok); background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); }
  .chip.amc { color:var(--amber); background:rgba(255,180,84,.1); border:1px solid rgba(255,180,84,.4); }
  .chip.bdc { color:var(--bad); background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.4); }
  .tank { display:flex; flex-direction:column; align-items:center; height:270px; }
  .tk { position:relative; width:80px; flex:1; border:1px solid rgba(255,255,255,.2); border-radius:12px;
    overflow:hidden; background:rgba(255,255,255,.03); }
  .tkf { position:absolute; bottom:0; left:0; right:0; height:100%; transition:height 1.5s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(74,222,128,.55),rgba(74,222,128,.25)); }
  .tkn { position:absolute; top:50%; left:0; right:0; transform:translateY(-50%); text-align:center;
    font-family:"Sora",sans-serif; font-weight:800; font-size:26px; color:#eafff2; text-shadow:0 2px 10px rgba(0,0,0,.8); }
  .tkn small { display:block; font-size:11px; letter-spacing:.08em; color:#bfe9cd; font-weight:700; }
  .tklab { margin-top:12px; font-family:"Sora",sans-serif; font-weight:700; font-size:15px; color:var(--dim); }

  /* ---------- S6 proposal ---------- */
  .prow { width:640px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.15); border-radius:13px;
    padding:13px 18px; margin:9px auto; display:flex; align-items:center; gap:13px; text-align:left;
    opacity:0; transform:translateY(28px); transition:all .5s cubic-bezier(.2,.85,.3,1.1); font-size:18px; }
  .prow.in { opacity:1; transform:none; }
  .prow b { font-family:"Sora",sans-serif; }
  .prow .why { margin-left:auto; font-size:14px; font-weight:700; color:var(--ok);
    background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); border-radius:8px; padding:3px 10px; white-space:nowrap; }
  .prow .why.alt { color:var(--amber); background:rgba(255,180,84,.1); border-color:rgba(255,180,84,.4); }
  .prow .tick { width:22px; height:22px; border-radius:7px; border:1.5px solid rgba(255,255,255,.3); flex:none; position:relative; }
  .prow .tick.on { border-color:var(--ok); background:rgba(74,222,128,.15); }
  .prow .tick.on::after { content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ok); font-weight:800; font-size:14px; }
  .prow .hotel { transition:all .4s; border-radius:8px; padding:2px 9px; }
  .prow .hotel.swap { background:rgba(167,139,250,.2); border:1px solid rgba(167,139,250,.5); }
  #allocbtn { display:inline-block; margin-top:20px; background:var(--grad); color:#0b0f1e; padding:13px 30px;
    border-radius:12px; font-weight:700; font-family:"Sora",sans-serif; font-size:19px; opacity:0; transition:all .4s; transform:scale(.9); }
  #allocbtn.in { opacity:1; transform:none; }
  #allocbtn.pressed { transform:scale(.94); box-shadow:0 0 55px rgba(124,150,255,.75); }
  #ledgerline { margin-top:18px; font-size:15px; color:var(--faint); font-family:ui-monospace,Menlo,monospace;
    opacity:0; transition:opacity .6s; }
  #ledgerline.show { opacity:1; }
  #ledgerline b { color:var(--ok); }

  /* ---------- outro ---------- */
  #logo7 { opacity:0; transform:scale(.78); transition:all 1s cubic-bezier(.2,.9,.3,1.12); text-align:center; }
  #logo7.show { opacity:1; transform:none; }

  @media (prefers-reduced-motion: reduce) { #world, .kl, .h2, .oc, .prow { transition-duration:.01s !important; } }
</style>
</head>
<body>
<div id="bgfx"><div class="blob b1"></div><div class="blob b2"></div></div>
<div id="bar"></div><div id="marks"></div>
<div id="flash"></div>

<div id="gate">
  <div class="ghost">
    <div class="gb" style="height:96%"><i></i></div>
    <div class="gb" style="height:72%"><i></i></div>
    <div class="gb" style="height:72%"><i></i></div>
  </div>
  <h1><b>How the allocation engine thinks</b><br>70 rooms · 100 requested — one worked example</h1>
  <button id="play" aria-label="Play">▶</button>
  <p>~2 minutes · voiceover &amp; music 🔊</p>
</div>

<div id="viewport">
  <div id="film">
    <div id="world"></div>
    <div id="cap"></div>
  </div>
</div>
<svg id="cursor" viewBox="0 0 24 24"><path d="M4 2l16 11-7 1.5L16.5 22l-3.6 1.4-3.5-7.6L4 20z" fill="#fff" stroke="#0b0f1e" stroke-width="1.4"/></svg>
<div id="hud" style="display:none">
  <button id="mus">music ✓</button><button id="vox">voice ✓</button><button id="cc">cc ✕</button><button id="fs">⛶ fullscreen</button><button id="restart">↺ replay</button>
</div>

<script>
'use strict';
const $ = (s) => document.querySelector(s);
const $$ = (s) => [...document.querySelectorAll(s)];
const world = $('#world');
const W = 1120, H = 700;                      // fixed composition, scaled like a video
const scenes = [];
for (let i = 0; i < 8; i++) { const s = document.createElement('div'); s.className = 'scene'; world.appendChild(s); scenes.push(s); }
function fitStage() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  document.documentElement.style.setProperty('--sc', s);
}
fitStage();
addEventListener('resize', fitStage);
document.addEventListener('fullscreenchange', fitStage);

/* ============ the worked example (single night, one property pool) ============
   Demands: A 40 · B 30 · C 30  (ranking A > B > C) — capacity 70.
   Pass A (floor 30%): A +12, B +9, C +9  → 30 used, 40 left.
   Pass B (ranking):   A +28 → 40 FULL · B +12 → 21 (70%) · C stays 9 (floor).
   Without the floor:  A 40 · B 30 · C 0.                                        */
const EX = { cap: 70, orgs: [
  { id: 'A', want: 40, floor: 12, final: 40 },
  { id: 'B', want: 30, floor: 9,  final: 21 },
  { id: 'C', want: 30, floor: 9,  final: 9  }] };

/* ---------------- scenes ---------------- */
scenes[0].innerHTML = `<div class="k">
  <span class="kl">Three organisations.</span>
  <span class="kl g">70 rooms. 100 requested.</span>
  <span class="kl small" style="margin-top:20px">This is how the acmOS engine decides — and how you stay in charge.</span></div>`;

scenes[1].innerHTML = `<div class="kick">The input</div>
  <div class="h2">Each organisation tells the engine what it needs.</div>
  <div class="cards">${EX.orgs.map((o, i) => `
    <div class="oc" id="oc${o.id}">
      <span class="rk">${i + 1}${['st', 'nd', 'rd'][i]} in your ranking</span>
      <h4><span class="dot"></span>Organisation ${o.id}</h4>
      <div class="want num">${o.want} rooms<small>for the same night</small></div>
      <div class="ln">Ranked properties: <b>1st · 2nd · 3rd choice</b></div>
      <div class="ln">Demand: <b>night by night</b> · Mix: <b>Doubles · DUS · Suites</b></div>
    </div>`).join('')}</div>
  <div id="totchip"><span class="num">100 requested</span> · <span class="num">only 70 available</span></div>`;

scenes[2].innerHTML = `<div class="kick">The rules — all four are yours</div>
  <div class="h2">The engine weighs four things you control.</div>
  <div class="consider" id="cons">
    <div><span class="ic">🏆</span><span><b>Your ranking</b><small>Who is served first. Never first-come-first-served.</small></span></div>
    <div><span class="ic">📏</span><span><b>Entitlements</b><small>A hard cap on what each organisation may draw.</small></span></div>
    <div><span class="ic">🧱</span><span><b>Group blocks</b><small>Rooms reserved per client group — nobody crosses them.</small></span></div>
    <div><span class="ic">⚖️</span><span><b>The fairness floor</b><small>A guaranteed share of each request, before winners win.</small></span></div>
  </div>`;

const labHTML = (idPrefix) => `
  <div class="lab">
    <div class="bars">${EX.orgs.map((o) => `
      <div class="bcol">
        <div class="tube" id="${idPrefix}t${o.id}" style="height:${o.want / EX.orgs[0].want * 74}%">
          <div class="fmark" id="${idPrefix}fm${o.id}"></div>
          <div class="cnt" id="${idPrefix}c${o.id}"><span class="num">0</span><small>of ${o.want}</small></div>
          <div class="fill" id="${idPrefix}f${o.id}"></div>
          <div class="tup" id="${idPrefix}u${o.id}"></div>
        </div>
        <div class="blab">${o.id}<small>wants ${o.want}</small></div>
        <div class="chip" id="${idPrefix}ch${o.id}"></div>
      </div>`).join('')}
    </div>
    <div class="tank">
      <div class="tk"><div class="tkf" id="${idPrefix}tkf"></div>
        <div class="tkn"><span class="num" id="${idPrefix}tkn">70</span><small>ROOMS LEFT</small></div></div>
      <div class="tklab">inventory</div>
    </div>
  </div>`;

scenes[3].innerHTML = `<div class="kick">Pass one — the guarantee</div>
  <div class="h2">Fairness floor: <span class="am">30% of each request</span> is granted first.</div>
  ${labHTML('a')}`;

scenes[4].innerHTML = `<div class="kick">Pass two — the ranking</div>
  <div class="h2">Above the floor, <span class="gr">your ranking</span> tops everyone up.</div>
  ${labHTML('b')}`;

scenes[5].innerHTML = `<div class="kick">Why the floor matters</div>
  <div class="h2" id="cfTitle">Turn the floor off, and C gets <span style="color:var(--bad)">nothing</span>.</div>
  ${labHTML('x')}`;

scenes[6].innerHTML = `<div class="kick">The output</div>
  <div class="h2">A proposal — with a reason on every line.</div>
  <div style="margin-top:22px; width:100%">
  <div class="prow" id="pA"><span class="tick"></span><b>A</b><span class="hotel num">→ 1st choice · 40 of 40</span><span class="why">ranking honoured · FULL</span></div>
  <div class="prow" id="pB"><span class="tick"></span><b>B</b><span class="hotel num">→ 1st choice · 21 of 30</span><span class="why alt">inventory ran out · 70%</span></div>
  <div class="prow" id="pC"><span class="tick"></span><b>C</b><span class="hotel num" id="cHotel">→ 1st choice · 9 of 30</span><span class="why alt">fairness floor kept</span></div>
  <div style="text-align:center"><a id="allocbtn">✔ Allocate approved rows</a>
  <div id="ledgerline">ledger ► ALLOCATE +40 · +21 · +9 — <b>by ops@yourteam · 14:02:31 · auditable</b></div></div></div>`;

scenes[7].innerHTML = `<div id="logo7">
  <svg width="92" height="92" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#0b0f1e" stroke="rgba(255,255,255,.2)"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b7cfa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><path d="M16 6l2.2 6.4L25 14l-6.8 1.6L16 22l-2.2-6.4L7 14l6.8-1.6z" fill="url(#lg2)"/><circle cx="24" cy="8" r="2" fill="#ffb454"/></svg>

/* ================= AUDIO — ambient score only (no narration voice) ================= */
let AC = null, master, musGain, sfxGain, wet, musicOn = true;
const MVOL = .5;
function audioInit() {
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createDynamicsCompressor();
    master.threshold.value = -20; master.knee.value = 24; master.ratio.value = 5; master.connect(AC.destination);
    musGain = AC.createGain(); musGain.gain.value = MVOL; musGain.connect(master);
    sfxGain = AC.createGain(); sfxGain.gain.value = .5; sfxGain.connect(master);
    const dur = 2.6, rate = AC.sampleRate, ir = AC.createBuffer(2, rate * dur, rate);
    for (let ch = 0; ch < 2; ch++) { const d = ir.getChannelData(ch);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.6); }
    const conv = AC.createConvolver(); conv.buffer = ir;
    wet = AC.createGain(); wet.gain.value = .5; wet.connect(conv); conv.connect(musGain);
  } catch (e) { AC = null; }
}
const NOTE = { F2:87.31, G2:98, A2:110, C3:130.81, E3:164.81, F3:174.61, G3:196, A3:220, B3:246.94,
  C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392, A4:440, B4:493.88, C5:523.25, D5:587.33, E5:659.25, G5:783.99 };
const BPM = 84, SPB = 60 / BPM, BAR = SPB * 4;
const PROG = [
  { sub: NOTE.F2, pad: [NOTE.F3, NOTE.A3, NOTE.C4, NOTE.E4], arp: [NOTE.F4, NOTE.A4, NOTE.C5, NOTE.G4] },
  { sub: NOTE.A2, pad: [NOTE.A3, NOTE.C4, NOTE.E4, NOTE.G4], arp: [NOTE.E4, NOTE.A4, NOTE.B4, NOTE.C5] },
  { sub: NOTE.C3, pad: [NOTE.G3, NOTE.C4, NOTE.E4, NOTE.B4], arp: [NOTE.G4, NOTE.C5, NOTE.D5, NOTE.E5] },
  { sub: NOTE.G2, pad: [NOTE.G3, NOTE.B3, NOTE.D4, NOTE.E4], arp: [NOTE.D4, NOTE.G4, NOTE.B4, NOTE.E5] }];
function padChord(t, chord, dur) {
  chord.pad.forEach((fr) => [-4, 4].forEach((det) => {
    const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = fr; o.detune.value = det;
    f.type = 'lowpass'; f.frequency.setValueAtTime(750, t); f.frequency.linearRampToValueAtTime(1900, t + dur * .6);
    f.frequency.linearRampToValueAtTime(850, t + dur);
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(.045, t + 1.1); g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(f); f.connect(g); g.connect(musGain); g.connect(wet); o.start(t); o.stop(t + dur + .1);
  }));
  const s = AC.createOscillator(), sg = AC.createGain();
  s.type = 'sine'; s.frequency.value = chord.sub;
  sg.gain.setValueAtTime(0, t); sg.gain.linearRampToValueAtTime(.16, t + .9); sg.gain.linearRampToValueAtTime(0, t + dur);
  s.connect(sg).connect(musGain); s.start(t); s.stop(t + dur + .1);
}
let delayL = null;
function pluck(t, fr, v = .12) {
  if (!delayL) { delayL = AC.createDelay(1); delayL.delayTime.value = SPB * .75;
    const fb = AC.createGain(); fb.gain.value = .32; const dw = AC.createGain(); dw.gain.value = .3;
    delayL.connect(fb); fb.connect(delayL); delayL.connect(dw); dw.connect(musGain); dw.connect(wet); }
  const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  o.type = 'triangle'; o.frequency.value = fr; f.type = 'lowpass'; f.frequency.value = 2600;
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.0008, t + .55);
  o.connect(f); f.connect(g); g.connect(musGain); g.connect(wet); g.connect(delayL); o.start(t); o.stop(t + .6);
}
function heart(t) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(96, t); o.frequency.exponentialRampToValueAtTime(38, t + .16);
  g.gain.setValueAtTime(.5, t); g.gain.exponentialRampToValueAtTime(.001, t + .3);
  o.connect(g).connect(musGain); o.start(t); o.stop(t + .35);
}
const chime = (fr = 1320, v = .1) => { if (!AC) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.value = fr;
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + .6);
  o.connect(g).connect(sfxGain); g.connect(wet ?? sfxGain); o.start(t); o.stop(t + .65); };
const clack = () => { if (!AC) return; const t = AC.currentTime, b = AC.createBuffer(1, 1100, AC.sampleRate), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) ** 2;
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2100;
  const g = AC.createGain(); g.gain.value = .5; s.connect(f); f.connect(g); g.connect(sfxGain); s.start(t); };
const OUTRO_T = 118;
let barCount = 0, t0m = 0;
function scheduleBar() {
  const t = t0m + barCount * BAR, el = barCount * BAR;
  if (el > OUTRO_T) { barCount++; return; }
  const chord = PROG[(barCount >> 1) % 4];
  if (barCount % 2 === 0) padChord(t, chord, BAR * 2.15);
  if (el > 17 && el < OUTRO_T - 3)
    [0, 1.5, 2, 3, 3.5].forEach((b, i) => { if ((barCount + i) % 3 !== 2) pluck(t + b * SPB, chord.arp[i % 4], .09); });
  if (el > 31 && el < OUTRO_T - 5) { heart(t); heart(t + 2 * SPB); }
  barCount++;
}
function musicEnd() {
  if (!AC) return; const t = AC.currentTime;
  padChord(t, PROG[2], 6); chime(NOTE.C5 * 2, .12); setTimeout(() => chime(NOTE.G5 * 2, .08), 350);
  musGain.gain.setValueAtTime(musGain.gain.value, t + 3); musGain.gain.linearRampToValueAtTime(0, t + 7.5);
}

function pickVoice() { const vs = speechSynthesis.getVoices();

const duckTo = (v) => { if (AC && musGain) { musGain.gain.cancelScheduledValues(AC.currentTime);

let cueIx = 0, ticker = null, musicTimer = null, tStart = 0;
const nowS = () => AC ? AC.currentTime : performance.now() / 1000;
function start(seekTo = 0) {
  audioInit();
  $('#gate').style.display = 'none'; $('#hud').style.display = 'flex';
  tStart = nowS() + .1 - seekTo; barCount = Math.max(0, Math.floor(seekTo / BAR)); cueIx = 0;
  if (seekTo > 0) { world.style.transition = 'none';
    while (cueIx < CUES.length && CUES[cueIx][0] < seekTo) { try { CUES[cueIx][1](); } catch (e) {} cueIx++; }
    setTimeout(() => { world.style.transition = ''; }, 60); }
  if (FROZEN) { $('#bar').style.width = Math.min(100, seekTo / TOTAL * 100) + '%'; return; }
  if (AC) { t0m = tStart; musicTimer = setInterval(() => { if (t0m + barCount * BAR < AC.currentTime + 1.4) scheduleBar(); }, 220); }
  ticker = setInterval(() => {
    const el = nowS() - tStart;
    $('#bar').style.width = Math.min(100, el / TOTAL * 100) + '%';
    while (cueIx < CUES.length && CUES[cueIx][0] <= el) { try { CUES[cueIx][1](); } catch (e) { console.error(e); } cueIx++; }
    if (el > TOTAL) { clearInterval(ticker); clearInterval(musicTimer); }
  }, 50);
}
const goFullscreen = () => { const el = document.documentElement;
  if (!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen().catch(() => {}); };
