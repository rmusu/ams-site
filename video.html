<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>acmOS — How the allocation engine thinks</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#070b17; --ink:#eef1fb; --dim:#8d99c4; --blue:#5b7cfa; --violet:#a78bfa; --amber:#ffb454; --ok:#4ade80; --bad:#f87171; }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; background:var(--bg); color:var(--ink); font-family:"Inter",sans-serif; overflow:hidden; }

  /* ---------- poster / gate (YouTube-like) ---------- */
  #gate { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4vh; z-index:50;
    background:radial-gradient(ellipse 110% 110% at 50% 0%, #131c3f 0%, var(--bg) 70%); cursor:pointer; }
  #gate .ghost-bars { display:flex; gap:2vw; align-items:flex-end; height:22vh; opacity:.25; }
  #gate .gb { width:6vw; border-radius:6px 6px 0 0; background:linear-gradient(180deg,#7c96ff,#a78bfa); }
  #gate h1 { font-family:"Sora"; font-size:clamp(16px,2.6vw,26px); font-weight:700; text-align:center; color:var(--dim); }
  #gate h1 b { color:var(--ink); }
  #play { width:clamp(58px,9vw,84px); height:clamp(58px,9vw,84px); border-radius:50%; border:0; cursor:pointer; font-size:clamp(20px,3vw,30px); color:#0b0f1e;
    background:linear-gradient(135deg,#7c96ff,#a78bfa); box-shadow:0 0 50px rgba(124,150,255,.55); transition:transform .15s; }
  #gate:hover #play { transform:scale(1.1); }
  #gate p { color:var(--dim); font-size:12.5px; }

  #bar { position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,#7c96ff,#a78bfa); width:0%; z-index:40; }
  #hud { position:fixed; bottom:10px; right:10px; z-index:40; display:flex; gap:6px; opacity:.75; }
  #hud button { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:var(--ink);
    border-radius:8px; padding:5px 10px; font-size:11px; cursor:pointer; font-family:inherit; }

  /* ---------- world (continuous pan) ---------- */
  #world { position:absolute; inset:0; width:600vw; display:flex; transition:transform 1.3s cubic-bezier(.7,0,.25,1); }
  .scene { width:100vw; height:100vh; position:relative; flex:none; display:flex; align-items:center; justify-content:center; }

  .k { font-family:"Sora"; font-weight:800; letter-spacing:-.01em; text-align:center; padding:0 6vw; }
  .kl { display:block; font-size:clamp(22px,4.6vw,54px); opacity:0; transform:translateY(34px); filter:blur(5px); }
  .kl.show { opacity:1; transform:none; filter:none; transition:all .45s cubic-bezier(.2,.9,.3,1.15); }
  .kl.g { background:linear-gradient(92deg,#7c96ff,#a78bfa,#d6b4fe); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .kl.small { font-size:clamp(13px,1.8vw,20px); font-weight:600; color:var(--dim); font-family:"Inter"; }

  #cap { position:fixed; bottom:8vh; width:100%; text-align:center; z-index:35; padding:0 8vw;
    font-size:clamp(13px,1.6vw,19px); color:#c9d3f5; text-shadow:0 2px 14px rgba(0,0,0,.85); font-weight:600; }

  /* org request cards */
  .orgcard { width:22vw; min-width:190px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.16); border-radius:14px;
    padding:1.4vw; text-align:left; opacity:0; transform:translateY(50px); transition:all .6s cubic-bezier(.2,.85,.3,1.1); }
  .orgcard.in { opacity:1; transform:none; }
  .orgcard h4 { font-family:"Sora"; font-size:clamp(14px,1.5vw,19px); }
  .orgcard .ln { font-size:clamp(10px,1.05vw,13px); color:var(--dim); margin-top:.5vw; opacity:0; transition:opacity .4s; }
  .orgcard .ln.show { opacity:1; }
  .orgcard .ln b { color:var(--ink); font-weight:600; }

  /* considers list */
  .consider { text-align:left; font-size:clamp(14px,1.8vw,21px); font-weight:600; }
  .consider div { margin:1.6vh 0; opacity:0; transform:translateX(-30px); transition:all .45s cubic-bezier(.2,.9,.3,1.15); display:flex; gap:12px; align-items:center; }
  .consider div.show { opacity:1; transform:none; }
  .consider .ic { width:34px; height:34px; border-radius:10px; background:rgba(124,150,255,.14); border:1px solid rgba(124,150,255,.3);
    display:flex; align-items:center; justify-content:center; font-size:16px; flex:none; }

  /* fairness bars */
  .fw { display:flex; gap:3vw; align-items:flex-end; height:36vh; position:relative; }
  .fc { width:9vw; max-width:110px; height:100%; display:flex; flex-direction:column; justify-content:flex-end; }
  .ft { position:relative; flex:1; border:1px solid rgba(255,255,255,.15); border-radius:10px; overflow:hidden; background:rgba(255,255,255,.03); }
  .ff { position:absolute; bottom:0; left:0; right:0; height:0%; transition:height 1.5s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(124,150,255,.9),rgba(167,139,250,.65)); }
  .fu { position:absolute; left:0; right:0; bottom:0%; height:0%; transition:all 1.5s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(255,180,84,.95),rgba(255,180,84,.55)); }
  .fl { text-align:center; margin-top:10px; font-size:clamp(12px,1.4vw,16px); font-weight:700; font-family:"Sora"; }
  .fl small { display:block; color:var(--dim); font-weight:500; font-size:10.5px; }
  #fline { position:absolute; left:-4%; right:-4%; bottom:0%; border-top:2px dashed var(--amber); opacity:0; transition:bottom 1.4s, opacity .5s; }
  #fline span { position:absolute; right:0; top:-22px; font-size:11px; color:var(--amber); font-weight:700; }

  /* proposal rows + interaction */
  .prow { width:min(620px,84vw); background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.15); border-radius:12px;
    padding:12px 16px; margin:8px auto; display:flex; align-items:center; gap:12px; text-align:left;
    opacity:0; transform:translateY(30px); transition:all .5s cubic-bezier(.2,.85,.3,1.1); font-size:clamp(12px,1.4vw,15px); }
  .prow.in { opacity:1; transform:none; }
  .prow b { font-family:"Sora"; }
  .prow .why { margin-left:auto; font-size:clamp(10px,1.1vw,12.5px); font-weight:700; color:var(--ok);
    background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); border-radius:8px; padding:3px 9px; white-space:nowrap; }
  .prow .why.alt { color:var(--amber); background:rgba(255,180,84,.1); border-color:rgba(255,180,84,.4); }
  .prow .tick { width:20px; height:20px; border-radius:6px; border:1.5px solid rgba(255,255,255,.3); flex:none; position:relative; }
  .prow .tick.on { border-color:var(--ok); background:rgba(74,222,128,.15); }
  .prow .tick.on::after { content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ok); font-weight:800; font-size:13px; }
  .prow .hotel { transition:all .4s; border-radius:8px; padding:2px 8px; }
  .prow .hotel.swap { background:rgba(167,139,250,.18); border:1px solid rgba(167,139,250,.45); }
  #cursor { position:fixed; width:22px; height:22px; z-index:38; pointer-events:none; opacity:0; transition:all .9s cubic-bezier(.4,.1,.3,1); filter:drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
  #allocbtn { display:inline-block; margin-top:2.4vh; background:linear-gradient(92deg,#7c96ff,#a78bfa); color:#0b0f1e;
    padding:11px 26px; border-radius:11px; font-weight:700; font-size:clamp(13px,1.5vw,16px); opacity:0; transition:all .4s; transform:scale(.9); }
  #allocbtn.in { opacity:1; transform:none; }
  #allocbtn.pressed { transform:scale(.94); box-shadow:0 0 50px rgba(124,150,255,.7); }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:45; }
  #logo6 { opacity:0; transform:scale(.75); transition:all .9s cubic-bezier(.2,.9,.3,1.15); text-align:center; }
  #logo6.show { opacity:1; transform:none; }
</style>
</head>
<body>
<div id="bar"></div>
<div id="flash"></div>

<div id="gate">
  <div class="ghost-bars"><div class="gb" style="height:88%"></div><div class="gb" style="height:64%"></div><div class="gb" style="height:46%"></div></div>
  <h1><b>How the allocation engine thinks</b><br>Organisation A · B · C — one worked example</h1>
  <button id="play">▶</button>
  <p>~70 seconds · sound on 🔊</p>
</div>

<div id="stage" style="position:fixed; inset:0">
  <div id="world"></div>
</div>
<div id="cap"></div>
<svg id="cursor" viewBox="0 0 24 24"><path d="M4 2l16 11-7 1.5L16.5 22l-3.6 1.4-3.5-7.6L4 20z" fill="#fff" stroke="#0b0f1e" stroke-width="1.4"/></svg>
<div id="hud" style="display:none">
  <button id="mus">music ✓</button><button id="vox">voice ✓</button><button id="restart">↺ replay</button>
</div>

<script>
'use strict';
const $ = (s) => document.querySelector(s);
const world = $('#world');
const scenes = [];
for (let i = 0; i < 6; i++) { const s = document.createElement('div'); s.className = 'scene'; world.appendChild(s); scenes.push(s); }

// S0 — meet the engine
scenes[0].innerHTML = `<div class="k">
  <span class="kl">Three organisations.</span>
  <span class="kl g">One scarce inventory.</span>
  <span class="kl small" style="margin-top:2.5vh">Here is how the acmOS engine decides — and how you stay in charge.</span></div>`;

// S1 — the requests arrive
scenes[1].innerHTML = `<div style="text-align:center">
  <div class="k" style="margin-bottom:4vh"><span class="kl" style="font-size:clamp(20px,3.4vw,42px)">Each organisation tells the engine what it needs.</span></div>
  <div style="display:flex; gap:2.5vw; justify-content:center">
    ${['A', 'B', 'C'].map((o) => `<div class="orgcard" id="org${o}">
      <h4>Organisation ${o}</h4>
      <div class="ln">Ranked properties: <b>1st · 2nd · 3rd choice</b></div>
      <div class="ln">Demand: <b>rooms &amp; guests, night by night</b></div>
      <div class="ln">Room mix: <b>Doubles · single-use · Suites</b></div>
    </div>`).join('')}
  </div></div>`;

// S2 — what the engine considers
scenes[2].innerHTML = `<div style="text-align:center">
  <div class="k" style="margin-bottom:4vh"><span class="kl" style="font-size:clamp(20px,3.4vw,42px)">The engine weighs four things you control.</span></div>
  <div class="consider" id="cons">
    <div><span class="ic">🏆</span><span><b>Your ranking</b> — who is served first. Never first-come-first-served.</span></div>
    <div><span class="ic">📏</span><span><b>Entitlements</b> — a hard cap on what each organisation may draw.</span></div>
    <div><span class="ic">🧱</span><span><b>Group blocks</b> — rooms reserved per client group; nobody crosses them.</span></div>
    <div><span class="ic">⚖</span><span><b>The fairness floor</b> — a guaranteed share for everyone, before winners win.</span></div>
  </div></div>`;

// S3 — fairness in action (A, B, C — same group)
scenes[3].innerHTML = `<div style="text-align:center; position:relative">
  <div class="k" style="margin-bottom:4vh"><span class="kl" style="font-size:clamp(20px,3.4vw,42px)">Fairness first. <span style="color:var(--amber)">Then the ranking.</span></span></div>
  <div class="fw" id="fw" style="display:inline-flex">
    <div id="fline"><span>guaranteed floor</span></div>
  </div></div>`;
[['A', '1st in ranking'], ['B', '2nd in ranking'], ['C', '3rd in ranking']].forEach(([o, sub]) => {
  const c = document.createElement('div'); c.className = 'fc';
  c.innerHTML = `<div class="ft"><div class="ff"></div><div class="fu"></div></div><div class="fl">${o}<small>${sub}</small></div>`;
  $('#fw').insertBefore(c, $('#fline'));
});

// S4 — the proposal + user interaction
scenes[4].innerHTML = `<div style="text-align:center; width:100%">
  <div class="k" style="margin-bottom:3vh"><span class="kl" style="font-size:clamp(20px,3.4vw,42px)">A proposal — with reasons. Not a decision.</span></div>
  <div class="prow" id="pA"><span class="tick"></span><b>A</b><span class="hotel">→ its 1st choice</span><span class="why">preference honoured · FULL</span></div>
  <div class="prow" id="pB"><span class="tick"></span><b>B</b><span class="hotel">→ its 2nd choice</span><span class="why">1st choice full · FULL</span></div>
  <div class="prow" id="pC"><span class="tick"></span><b>C</b><span class="hotel" id="cHotel">→ closest alternative</span><span class="why alt">similar price &amp; distance</span></div>
  <a id="allocbtn">✔ Allocate approved rows</a></div>`;

// S5 — outro
scenes[5].innerHTML = `<div id="logo6">
  <svg width="76" height="76" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#0b0f1e" stroke="rgba(255,255,255,.2)"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b7cfa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><path d="M16 6l2.2 6.4L25 14l-6.8 1.6L16 22l-2.2-6.4L7 14l6.8-1.6z" fill="url(#lg2)"/><circle cx="24" cy="8" r="2" fill="#ffb454"/></svg>
  <div style="font-family:'Sora'; font-weight:800; font-size:clamp(26px,4vw,40px); margin-top:12px">acm<span style="background:linear-gradient(92deg,#7c96ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent">OS</span></div>
  <div style="color:var(--dim); font-size:clamp(13px,1.6vw,16px); margin-top:8px">The engine proposes. Your team decides.<br>Nothing is written until you approve.</div></div>`;

/* ---------- music & sfx (synthesized, no assets) ---------- */
let AC, musGain, sfxGain, musicOn = true, voiceOn = true;
function audioInit() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  const master = AC.createDynamicsCompressor(); master.connect(AC.destination);
  musGain = AC.createGain(); musGain.gain.value = .45; musGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = .65; sfxGain.connect(master);
}
const BPM = 96, SPB = 60 / BPM;
const kick = (t) => { const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(140, t); o.frequency.exponentialRampToValueAtTime(46, t + .12);
  g.gain.setValueAtTime(.8, t); g.gain.exponentialRampToValueAtTime(.001, t + .24);
  o.connect(g).connect(musGain); o.start(t); o.stop(t + .3); };
const hat = (t, v = .09) => { const b = AC.createBuffer(1, 2000, 44100), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 8500;
  const g = AC.createGain(); g.gain.value = v;
  s.connect(f).connect(g).connect(musGain); s.start(t); };
const bass = (t, fr) => { const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = fr; f.type = 'lowpass'; f.frequency.value = 280;
  g.gain.setValueAtTime(.24, t); g.gain.exponentialRampToValueAtTime(.001, t + SPB * .9);
  o.connect(f).connect(g).connect(musGain); o.start(t); o.stop(t + SPB); };
const pad = (t, freqs, dur, v = .06) => freqs.forEach((fr) => [0, 4].forEach((det) => {
  const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = fr; o.detune.value = det;
  f.type = 'lowpass'; f.frequency.setValueAtTime(450, t); f.frequency.linearRampToValueAtTime(1700, t + dur * .7);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(v, t + .7); g.gain.linearRampToValueAtTime(0, t + dur);
  o.connect(f).connect(g).connect(musGain); o.start(t); o.stop(t + dur); }));
const clack = () => { if (!AC) return; const t = AC.currentTime, b = AC.createBuffer(1, 1300, 44100), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) ** 2;
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2400;
  const g = AC.createGain(); g.gain.value = .7;
  s.connect(f).connect(g).connect(sfxGain); s.start(t); };
const chime = (fr = 1320, v = .11) => { if (!AC) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.value = fr;
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + .5);
  o.connect(g).connect(sfxGain); o.start(t); o.stop(t + .5); };
const CHORDS = [[110, 165, 220], [87.3, 130.8, 174.6], [130.8, 196, 261.6], [98, 147, 196]];
const BLINE = [55, 55, 65.4, 73.4];
let barCount = 0, t0 = 0;
function scheduleBar() {
  if (!musicOn) { barCount++; return; }
  const L = SPB * 4, t = t0 + barCount * L, el = barCount * L;
  if (el > 4) for (let b = 0; b < 4; b++) kick(t + b * SPB);
  if (el > 10) for (let b = 0; b < 8; b++) hat(t + b * SPB / 2, b % 2 ? .09 : .045);
  if (el > 10) for (let b = 0; b < 4; b++) bass(t + b * SPB, BLINE[barCount % 4] * (b % 2 ? 2 : 1));
  if (el > 16) pad(t, CHORDS[barCount % 4], L * 1.05, el > 42 ? .08 : .055);
  barCount++;
}

/* ---------- narration ---------- */
let VOICE = null;
function pickVoice() { const vs = speechSynthesis.getVoices();
  VOICE = vs.find((v) => /en[-_](GB|US)/i.test(v.lang) && /natural|neural|aria|jenny|sonia|libby/i.test(v.name))
       ?? vs.find((v) => /^en/i.test(v.lang)) ?? null; }
if ('speechSynthesis' in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
const say = (tx) => { if (!voiceOn || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(tx); if (VOICE) u.voice = VOICE;
  u.rate = 1.0; u.pitch = 1.0; speechSynthesis.speak(u); };
const cap = (tx) => { $('#cap').textContent = tx; };

/* ---------- timeline ---------- */
const goTo = (i) => { world.style.transform = `translateX(${-i * 100}vw)`; };
const showK = (scene, i) => { const el = scenes[scene].querySelectorAll('.kl')[i]; if (el) { el.classList.add('show'); clack(); } };
const flash = () => { const f = $('#flash'); f.style.transition = 'none'; f.style.opacity = .45;
  requestAnimationFrame(() => { f.style.transition = 'opacity .5s'; f.style.opacity = 0; }); };
const moveCursor = (x, y, show = true) => { const c = $('#cursor');
  c.style.opacity = show ? 1 : 0; c.style.left = x + 'px'; c.style.top = y + 'px'; };
const centerOf = (el) => { const r = el.getBoundingClientRect(); return [r.left + r.width * .8, r.top + r.height * .5]; };

const CUES = [
  // S0 · 0–10s
  [0.3, () => { showK(0, 0); say('Three organisations. One scarce inventory.'); }],
  [1.9, () => showK(0, 1)],
  [3.6, () => { showK(0, 2); say('Here is how the acm O S engine decides — and how you stay in charge.'); }],
  // S1 · 10–24s — the requests
  [9.0, () => { goTo(1); flash(); }],
  [9.8, () => { showK(1, 0); say('Each organisation tells the engine what it needs:'); }],
  [11.2, () => ['A', 'B', 'C'].forEach((o, i) => setTimeout(() => { $('#org' + o).classList.add('in'); clack(); }, i * 380))],
  [13.2, () => { say('its properties in order of preference, its demand night by night, and its mix of room types.');
    document.querySelectorAll('.orgcard .ln').forEach((l, i) => setTimeout(() => l.classList.add('show'), (i % 3) * 1400 + 200)); }],
  [19.5, () => cap('Ranked preferences · per-night demand · room mix')],
  // S2 · 24–40s — what it considers
  [22.5, () => { goTo(2); flash(); cap(''); }],
  [23.4, () => { showK(2, 0); say('The engine weighs four things — and you control all of them.'); }],
  [26.0, () => { const rows = document.querySelectorAll('#cons > div');
    const lines = ['Your ranking: who is served first. Never first come, first served.',
      'Entitlements: a hard cap on what each organisation may draw.',
      'Group blocks: rooms reserved per client group. Nobody crosses them.',
      'And the fairness floor: a guaranteed share for everyone, before winners win.'];
    rows.forEach((r, i) => setTimeout(() => { r.classList.add('show'); clack(); say(lines[i]); }, i * 3100)); }],
  // S3 · 40–56s — fairness among A/B/C
  [39.0, () => { goTo(3); flash(); cap(''); }],
  [39.9, () => { showK(3, 0); say('Within the same group, fairness comes first.'); }],
  [42.0, () => { $('#fline').style.opacity = 1; $('#fline').style.bottom = '45%';
    document.querySelectorAll('.ff').forEach((f) => { f.style.height = '45%'; });
    setTimeout(() => chime(660, .18), 1500);
    say('Every organisation — first or last in the ranking — is guaranteed its share of its own request.');
    cap('A, B and C all reach the guaranteed floor'); }],
  [48.0, () => { say('Above the floor, your ranking rules: A tops up first, then B, then C — until the rooms run out.');
    cap('Above the floor, the ranking decides the top-ups');
    [['A', 55], ['B', 30], ['C', 10]].forEach(([o, extra], i) => setTimeout(() => {
      const fu = document.querySelectorAll('.fu')[i];
      fu.style.bottom = '45%'; fu.style.height = extra + '%'; chime(880 + i * 120, .09);
    }, 700 + i * 700)); }],
  // S4 · 56–74s — proposal + interaction
  [55.0, () => { goTo(4); flash(); cap(''); }],
  [55.9, () => { showK(4, 0); say('The result is a proposal — with a reason on every line. Not a decision.'); }],

const TOTAL = 82;

let cueIx = 0, ticker = null, musicTimer = null;
function start() {
  audioInit();
  $('#gate').style.display = 'none'; $('#hud').style.display = 'flex';
  t0 = AC.currentTime + .1; barCount = 0; cueIx = 0;
  musicTimer = setInterval(() => { if (t0 + barCount * SPB * 4 < AC.currentTime + 1.2) scheduleBar(); }, 200);
  ticker = setInterval(() => {
    const el = AC.currentTime - t0;
    $('#bar').style.width = Math.min(100, el / TOTAL * 100) + '%';
    while (cueIx < CUES.length && CUES[cueIx][0] <= el) { try { CUES[cueIx][1](); } catch (e) { console.error(e); } cueIx++; }
    if (el > TOTAL) { clearInterval(ticker); clearInterval(musicTimer); }
  }, 50);
}
$('#gate').onclick = start;
$('#restart').onclick = () => location.reload();
$('#mus').onclick = (e) => { e.stopPropagation(); musicOn = !musicOn; if (musGain) musGain.gain.value = musicOn ? .45 : 0; e.target.textContent = musicOn ? 'music ✓' : 'music ✕'; };
$('#vox').onclick = (e) => { e.stopPropagation(); voiceOn = !voiceOn; if (!voiceOn) speechSynthesis.cancel(); e.target.textContent = voiceOn ? 'voice ✓' : 'voice ✕'; };
</script>
