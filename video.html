<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>acmOS — The Film</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#05070f; --ink:#eef1fb; --dim:#8d99c4; --blue:#5b7cfa; --violet:#a78bfa; --amber:#ffb454; --ok:#4ade80; --bad:#f87171; }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; background:var(--bg); color:var(--ink); font-family:"Inter",sans-serif; overflow:hidden; }
  #stage { position:fixed; inset:0; }
  .aurora { position:absolute; border-radius:50%; filter:blur(100px); opacity:.35; pointer-events:none; transition:opacity 2s; }

  /* ---------- gate ---------- */
  #gate { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; z-index:50; background:radial-gradient(ellipse 100% 100% at 50% 0%, #131c3f 0%, var(--bg) 65%); }
  #gate h1 { font-family:"Sora"; font-size:clamp(26px,4vw,44px); font-weight:800; text-align:center; }
  #gate h1 b { background:linear-gradient(92deg,#7c96ff,#a78bfa); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #gate p { color:var(--dim); font-size:15px; }
  #play { width:96px; height:96px; border-radius:50%; border:0; cursor:pointer; font-size:34px; color:#0b0f1e;
    background:linear-gradient(135deg,#7c96ff,#a78bfa); box-shadow:0 0 60px rgba(124,150,255,.5); transition:transform .15s; }
  #play:hover { transform:scale(1.08); }

  /* ---------- film chrome ---------- */
  #bar { position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,#7c96ff,#a78bfa); width:0%; z-index:40; }
  #hud { position:fixed; bottom:16px; right:16px; z-index:40; display:flex; gap:8px; opacity:.75; }
  #hud button { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:var(--ink);
    border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:inherit; }

  /* ---------- world (continuous pan, no cuts) ---------- */
  #world { position:absolute; inset:0; width:700vw; display:flex; transition:transform 1.4s cubic-bezier(.7,0,.25,1); }
  .scene { width:100vw; height:100vh; position:relative; flex:none; display:flex; align-items:center; justify-content:center; }

  /* ---------- kinetic type ---------- */
  .k { position:absolute; width:100%; text-align:center; font-family:"Sora"; font-weight:800; letter-spacing:-.01em; padding:0 6vw; }
  .kl { display:block; font-size:clamp(30px,6vw,74px); opacity:0; transform:translateY(40px) scale(.96); filter:blur(6px); }
  .kl.show { opacity:1; transform:none; filter:none; transition:all .45s cubic-bezier(.2,.9,.3,1.2); }
  .kl.g { background:linear-gradient(92deg,#7c96ff,#a78bfa,#d6b4fe); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .kl.amber { color:var(--amber); }
  .kl.small { font-size:clamp(17px,2.2vw,26px); font-weight:600; color:var(--dim); font-family:"Inter"; }

  /* ---------- captions ---------- */
  #cap { position:fixed; bottom:56px; width:100%; text-align:center; z-index:35; padding:0 8vw;
    font-size:clamp(15px,1.7vw,21px); color:#c9d3f5; text-shadow:0 2px 14px rgba(0,0,0,.8); font-weight:600; }

  /* ---------- scene visuals ---------- */
  .grid { display:grid; gap:5px; }
  .cell { border-radius:4px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.05); transition:all .3s; }
  .cell.on { background:rgba(91,124,250,.55); border-color:rgba(124,150,255,.8); box-shadow:0 0 12px rgba(124,150,255,.45); }
  .cell.bad { background:rgba(248,113,113,.55); border-color:var(--bad); box-shadow:0 0 12px rgba(248,113,113,.5); }
  .cell.gold { background:rgba(255,180,84,.6); border-color:var(--amber); box-shadow:0 0 12px rgba(255,180,84,.5); }

  .chip { position:absolute; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2); border-radius:20px;
    padding:6px 14px; font-size:13px; font-weight:600; opacity:0; transform:translateX(-60vw); transition:all .8s cubic-bezier(.2,.8,.3,1); }
  .chip.in { opacity:1; transform:none; }
  .chip.done { border-color:var(--ok); color:var(--ok); }

  .fairwrap { display:flex; gap:2.4vw; align-items:flex-end; height:42vh; }
  .fcol { width:6.5vw; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:8px; height:100%; }
  .ftube { width:100%; height:100%; border:1px solid rgba(255,255,255,.15); border-radius:10px; position:relative; overflow:hidden; background:rgba(255,255,255,.03); }
  .fill { position:absolute; bottom:0; left:0; right:0; height:0%; transition:height 1.6s cubic-bezier(.3,.7,.3,1);
    background:linear-gradient(180deg,rgba(124,150,255,.9),rgba(167,139,250,.7)); }
  .fill.top { background:linear-gradient(180deg,rgba(255,180,84,.95),rgba(255,180,84,.6)); }
  .flab { font-size:12px; color:var(--dim); font-weight:600; }
  #floorline { position:absolute; left:-4%; right:-4%; bottom:0%; border-top:2px dashed var(--amber); opacity:0; transition:bottom 1.4s, opacity .6s; }
  #floorline span { position:absolute; right:0; top:-24px; font-size:12px; color:var(--amber); font-weight:700; }

  .reason { display:inline-block; margin:6px; padding:9px 16px; border-radius:10px; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.14); font-size:clamp(12px,1.4vw,16px); opacity:0; transform:scale(.8); transition:all .4s cubic-bezier(.2,.9,.3,1.3); }
  .reason.show { opacity:1; transform:none; }
  .reason b { color:var(--ok); }

  #logo { opacity:0; transform:scale(.7); transition:all 1s cubic-bezier(.2,.9,.3,1.2); }
  #logo.show { opacity:1; transform:none; }
  .cta { display:inline-block; margin-top:26px; background:linear-gradient(92deg,#7c96ff,#a78bfa); color:#0b0f1e;
    padding:13px 30px; border-radius:12px; font-weight:700; text-decoration:none; font-size:16px; box-shadow:0 0 40px rgba(124,150,255,.4); }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:45; }
</style>
</head>
<body>
<div id="bar"></div>
<div id="flash"></div>

<div id="gate">
  <h1>The way major events<br>handle accommodation<br><b>is about to change.</b></h1>
  <button id="play" title="Play">▶</button>
  <p>90 seconds · sound on 🔊</p>
</div>

<div id="stage">
  <div class="aurora" style="width:60vw;height:50vh;top:-20vh;left:15vw;background:#3d63f5"></div>
  <div class="aurora" style="width:40vw;height:40vh;bottom:-15vh;right:5vw;background:#7c3aed"></div>
  <div id="world"></div>
</div>
<div id="cap"></div>
<div id="hud" style="display:none">
  <button id="mus">music ✓</button><button id="vox">voice ✓</button><button id="restart">↺ replay</button>
  <button onclick="location.href='index.html'">exit ✕</button>
</div>

<script>
'use strict';
const $ = (s) => document.querySelector(s);
const world = $('#world');

/* =========================================================
   SCENES (7 panels on one continuous canvas — no hard cuts)
   ========================================================= */
const scenes = [];
for (let i = 0; i < 7; i++) { const s = document.createElement('div'); s.className = 'scene'; world.appendChild(s); scenes.push(s); }

// S0 — hook (pain, kinetic type only)
scenes[0].innerHTML = `<div class="k" id="s0">
  <span class="kl">3,000 rooms.</span><span class="kl">40 delegations.</span>
  <span class="kl">17 nights.</span><span class="kl amber">One spreadsheet.</span>
  <span class="kl small" style="margin-top:3vh">This is how major events still run.</span></div>`;

// S1 — the lie of totals (glitching grid)
scenes[1].innerHTML = `<div style="text-align:center">
  <div class="grid" id="g1" style="grid-template-columns:repeat(17,3.2vw); margin:0 auto"></div>
  <div class="k" style="position:static; margin-top:4vh"><span class="kl" id="s1t" style="font-size:clamp(24px,3.6vw,48px)">Totals lie. Events live <i style="color:var(--amber)">night by night</i>.</span></div></div>`;
const g1 = $('#g1');
for (let i = 0; i < 17 * 6; i++) { const c = document.createElement('div'); c.className = 'cell'; c.style.height = '3.2vw'; g1.appendChild(c); }

// S2 — the ledger (grid materializes clean)
scenes[2].innerHTML = `<div style="text-align:center">
  <div class="k" style="position:static; margin-bottom:4vh"><span class="kl" id="s2t" style="font-size:clamp(26px,4vw,54px)">Meet the <span class="g" style="background:linear-gradient(92deg,#7c96ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent">room-night ledger</span>.</span></div>
  <div class="grid" id="g2" style="grid-template-columns:repeat(17,3.2vw); margin:0 auto"></div></div>`;
const g2 = $('#g2');
for (let i = 0; i < 17 * 6; i++) { const c = document.createElement('div'); c.className = 'cell'; c.style.height = '3.2vw'; g2.appendChild(c); }

// S3 — the engine (requests fly in, grid fills)
scenes[3].innerHTML = `
  <div id="chips"></div>
  <div style="text-align:center">
    <div class="grid" id="g3" style="grid-template-columns:repeat(17,3.2vw); margin:0 auto"></div>
    <div class="k" style="position:static; margin-top:4vh">
      <span class="kl" id="s3c" style="font-family:'Sora'; font-size:clamp(30px,5vw,64px)"></span>
      <span class="kl small" id="s3s"></span></div></div>`;
const g3 = $('#g3');
for (let i = 0; i < 17 * 6; i++) { const c = document.createElement('div'); c.className = 'cell'; c.style.height = '3.2vw'; g3.appendChild(c); }
const CHIPS = ['Canadian NOC · 40 Doubles', 'World Broadcasting · 120', 'Int. Ski Federation · 35', 'USA Press · 20 Twins', 'Marketing Partner · 25', 'Japan NOC · 60'];
CHIPS.forEach((t, i) => { const el = document.createElement('div'); el.className = 'chip'; el.textContent = t;
  el.style.top = (16 + i * 11) + 'vh'; el.style.left = '4vw'; $('#chips').appendChild(el); });

// S4 — fairness (water-filling: THE reveal)
scenes[4].innerHTML = `<div style="text-align:center; position:relative">
  <div class="k" style="position:static; margin-bottom:5vh"><span class="kl" id="s4t" style="font-size:clamp(26px,4vw,54px)">And here is the revolution: <span style="color:var(--amber)">fairness, as a dial.</span></span></div>
  <div class="fairwrap" id="fair" style="position:relative; display:inline-flex">
    <div id="floorline"><span>guaranteed floor · 50%</span></div>
  </div></div>`;
const FAIRS = [['NOC', 100], ['IF', 88], ['MRH', 74], ['MP', 58], ['PRESS', 42]];
FAIRS.forEach(([lab]) => {
  const col = document.createElement('div'); col.className = 'fcol';
  col.innerHTML = `<div class="ftube"><div class="fill"></div><div class="fill top" style="bottom:auto"></div></div><div class="flab">${lab}</div>`;
  $('#fair').insertBefore(col, $('#floorline'));
});

// S5 — explainable
scenes[5].innerHTML = `<div style="text-align:center; max-width:900px">
  <div class="k" style="position:static; margin-bottom:4vh"><span class="kl" id="s5t" style="font-size:clamp(26px,4vw,54px)">No black box.</span></div>
  <div id="reasons">
    <span class="reason">Japan NOC → Grand Palace · <b>1st choice · FULL</b></span>
    <span class="reason">USA Press → Brera · <b>alternative · 88% match</b></span>
    <span class="reason">MP capped at entitlement · <b>15 / night</b></span>
    <span class="reason">PRESS floor honoured · <b>42% guaranteed</b></span>
    <span class="reason">NOC block protected · <b>95 rooms reserved</b></span>
  </div>
  <div class="k" style="position:static; margin-top:4vh"><span class="kl small" id="s5s">Every decision comes with a reason you can read.</span></div></div>`;

// S6 — outro
scenes[6].innerHTML = `<div style="text-align:center">
  <div id="logo">
    <svg width="88" height="88" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#0b0f1e" stroke="rgba(255,255,255,.2)"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b7cfa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><path d="M16 6l2.2 6.4L25 14l-6.8 1.6L16 22l-2.2-6.4L7 14l6.8-1.6z" fill="url(#lg2)"/><circle cx="24" cy="8" r="2" fill="#ffb454"/></svg>
    <div style="font-family:'Sora'; font-weight:800; font-size:44px; margin-top:14px">acm<span style="background:linear-gradient(92deg,#7c96ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent">OS</span></div>
    <div style="color:var(--dim); font-size:17px; margin-top:8px">Built at the Games. For the Games.</div>
    <a class="cta" href="index.html#contact">Book a demo →</a>
  </div></div>`;

/* =========================================================
   MUSIC — synthesized live (no assets, no copyright)
   ========================================================= */
let AC, master, musGain, sfxGain, musicOn = true, voiceOn = true;
function audioInit() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createDynamicsCompressor(); master.connect(AC.destination);
  musGain = AC.createGain(); musGain.gain.value = .5; musGain.connect(master);
  sfxGain = AC.createGain(); sfxGain.gain.value = .7; sfxGain.connect(master);
}
const BPM = 100, SPB = 60 / BPM;
function kick(t) { const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(45, t + .12);
  g.gain.setValueAtTime(.9, t); g.gain.exponentialRampToValueAtTime(.001, t + .25);
  o.connect(g).connect(musGain); o.start(t); o.stop(t + .3); }
function hat(t, v = .12) { const b = AC.createBuffer(1, 2205, 44100), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 8000;
  const g = AC.createGain(); g.gain.value = v;
  s.connect(f).connect(g).connect(musGain); s.start(t); }
function bass(t, freq, dur = SPB * .9) { const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = freq; f.type = 'lowpass'; f.frequency.value = 300;
  g.gain.setValueAtTime(.28, t); g.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(f).connect(g).connect(musGain); o.start(t); o.stop(t + dur); }
function pad(t, freqs, dur, gainV = .07) { freqs.forEach((fr) => { [0, 3].forEach((det) => {
  const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = fr; o.detune.value = det;
  f.type = 'lowpass'; f.frequency.setValueAtTime(400, t); f.frequency.linearRampToValueAtTime(1800, t + dur * .7);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gainV, t + .8); g.gain.linearRampToValueAtTime(0, t + dur);
  o.connect(f).connect(g).connect(musGain); o.start(t); o.stop(t + dur); }); }); }
function riser(t, dur = 2) { const b = AC.createBuffer(1, 44100 * dur, 44100), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (i / d.length) * .5;
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.2;
  f.frequency.setValueAtTime(300, t); f.frequency.exponentialRampToValueAtTime(6000, t + dur);
  const g = AC.createGain(); g.gain.value = .3;
  s.connect(f).connect(g).connect(musGain); s.start(t); }
function clack() { if (!AC) return; const t = AC.currentTime; const b = AC.createBuffer(1, 1400, 44100), d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) ** 2;
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2600;
  const g = AC.createGain(); g.gain.value = .8;
  s.connect(f).connect(g).connect(sfxGain); s.start(t); }
function chime(freq = 1320, v = .12) { if (!AC) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + .5);
  o.connect(g).connect(sfxGain); o.start(t); o.stop(t + .5); }

// A-minor progression; intensity grows through the acts
const CHORDS = [[110, 165, 220], [87.3, 130.8, 174.6], [130.8, 196, 261.6], [98, 147, 196]]; // Am F C G
const BASSLINE = [55, 55, 65.4, 73.4]; // A C D per bar-ish
let musicTimer = null, barCount = 0, t0 = 0;
function scheduleMusic() {
  if (!musicOn) { barCount++; return; }
  const barLen = SPB * 4, t = t0 + barCount * barLen, el = barCount * barLen; // elapsed at bar start
  if (el > 6) for (let b = 0; b < 4; b++) kick(t + b * SPB);
  if (el > 14) for (let b = 0; b < 8; b++) hat(t + b * SPB / 2, b % 2 ? .1 : .05);
  if (el > 14) for (let b = 0; b < 4; b++) bass(t + b * SPB, BASSLINE[barCount % 4] * (b % 2 ? 2 : 1));
  if (el > 20) pad(t, CHORDS[barCount % 4], barLen * 1.05, el > 52 ? .09 : .06);
  barCount++;
}

/* ---------- narration ---------- */
let VOICE = null;
function pickVoice() { const vs = speechSynthesis.getVoices();
  VOICE = vs.find((v) => /en[-_](US|GB)/i.test(v.lang) && /female|aria|jenny|libby|sonia|zira|natural/i.test(v.name))
       ?? vs.find((v) => /^en/i.test(v.lang)) ?? null; }
if ('speechSynthesis' in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function say(text) { if (!voiceOn || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text); if (VOICE) u.voice = VOICE;
  u.rate = 1.02; u.pitch = .95; u.volume = 1; speechSynthesis.speak(u); }
function cap(text) { $('#cap').textContent = text; }

/* =========================================================
   TIMELINE — one cue list drives pans, visuals, voice, music hits
   ========================================================= */
const goTo = (i) => { world.style.transform = `translateX(${-i * 100}vw)`; };
const showK = (sel, i) => { const el = document.querySelectorAll(sel)[i]; if (el) { el.classList.add('show'); clack(); } };
const flash = () => { const f = $('#flash'); f.style.transition = 'none'; f.style.opacity = .55;
  requestAnimationFrame(() => { f.style.transition = 'opacity .5s'; f.style.opacity = 0; }); };

const CUES = [
  // ---- S0 · hook (0–13s) ----
  [0.3, () => { showK('#s0 .kl', 0); say('Three thousand rooms. Forty delegations. Seventeen nights.'); }],
  [1.6, () => showK('#s0 .kl', 1)],
  [2.9, () => showK('#s0 .kl', 2)],
  [4.4, () => { showK('#s0 .kl', 3); say('One spreadsheet.'); }],
  [6.6, () => { showK('#s0 .kl', 4); say('This is how major events still run.'); }],
  [10.5, () => { riser(AC.currentTime, 1.8); }],
  // ---- S1 · the lie (13–26s) ----
  [12.5, () => { goTo(1); flash(); cap(''); }],
  [13.2, () => { say('Booking tools count total rooms. But an event lives — and dies — night by night.');
    [...g1.children].forEach((c, i) => setTimeout(() => c.classList.add('on'), i * 12)); }],
  [16.0, () => { showK('#s1t', 0);
    [14, 31, 48, 65, 82, 99].forEach((i, k) => setTimeout(() => { g1.children[i].classList.replace('on', 'bad'); chime(220, .2); }, k * 350)); }],
  [21.0, () => { say('One oversold Tuesday is all it takes.'); cap('One oversold Tuesday is all it takes.'); }],
  // ---- S2 · the ledger (26–41s) ----
  [25.5, () => { goTo(2); flash(); cap(''); }],
  [26.4, () => { showK('#s2t', 0); say('Meet the room-night ledger. Every room. Every hotel. Every night. One source of truth.'); }],
  [27.2, () => { [...g2.children].forEach((c, i) => setTimeout(() => { c.classList.add('on'); if (i % 17 === 0) chime(880 + i * 4, .05); }, (i % 17) * 90 + Math.floor(i / 17) * 30)); }],
  [34.0, () => { cap('Append-only. Auditable. Rebuildable from history, provably.');
    say('Append only. Auditable. Rebuildable from history, provably.'); }],
  // ---- S3 · the engine (41–58s) ----
  [39.5, () => { goTo(3); flash(); cap(''); }],
  [40.4, () => { say('Now give it the requests.');
    document.querySelectorAll('.chip').forEach((c, i) => setTimeout(() => c.classList.add('in'), i * 260)); }],
  [43.0, () => { say('The allocation engine serves your ranking, respects every entitlement and every group block — and places an entire Games in seconds.');
    document.querySelectorAll('.chip').forEach((c, i) => setTimeout(() => c.classList.add('done'), 800 + i * 420));
    [...g3.children].forEach((c, i) => setTimeout(() => c.classList.add(Math.random() < .18 ? 'gold' : 'on'), 600 + Math.random() * 4200)); }],
  [44.0, () => { let n = 0; const el = $('#s3c'); el.classList.add('show');
    const iv = setInterval(() => { n = Math.min(412, n + 7); el.textContent = n + ' requests allocated';
      if (n >= 412) { clearInterval(iv); chime(1760, .18); } }, 55); }],
  [50.0, () => { showK('#s3s', 0); $('#s3s').textContent = 'Weeks of Excel → an afternoon of review.';
    cap('Weeks of Excel → an afternoon of review.'); say('Weeks of Excel become an afternoon of review.'); }],
  [54.5, () => riser(AC.currentTime, 2.2)],
  // ---- S4 · fairness (58–74s) ----
  [57.0, () => { goTo(4); flash(); cap(''); }],
  [57.9, () => { showK('#s4t', 0); say('And here is the revolution. Fairness — as a dial.'); }],
  [60.5, () => { say('Turn it up, and every organisation is guaranteed its share of the pie — before the ranking distributes the rest.');
    const fl = $('#floorline'); fl.style.opacity = 1; fl.style.bottom = '50%';
    document.querySelectorAll('#fair .fill:not(.top)').forEach((f) => { f.style.height = '50%'; });
    setTimeout(() => chime(660, .2), 1600); }],
  [65.5, () => { cap('Your ranking still rules — above the floor.'); say('Your ranking still rules — above the floor.');
    document.querySelectorAll('#fair .fcol').forEach((col, i) => {
      const [, target] = FAIRS[i]; const f = col.querySelector('.fill');
      setTimeout(() => { f.style.height = Math.max(50, target) + '%'; chime(880 + i * 110, .1); }, i * 380); }); }],
  // ---- S5 · explainable (74–86s) ----
  [72.5, () => { goTo(5); flash(); cap(''); }],
  [73.4, () => { showK('#s5t', 0); say('And no black box.'); }],
  [74.6, () => { document.querySelectorAll('.reason').forEach((r, i) => setTimeout(() => { r.classList.add('show'); clack(); }, i * 550)); }],
  [78.5, () => { showK('#s5s', 0); say('Every decision comes with a reason you can read. Your committee can audit the entire round.'); }],
  // ---- S6 · outro (86–95s) ----
  [84.5, () => { goTo(6); flash(); cap(''); }],
  [85.4, () => { $('#logo').classList.add('show'); chime(1320, .2); chime(1980, .12);
    say('acm O S. The accommodation operating system for major events. Built at the Games — for the Games.'); }],
  [92.0, () => { cap(''); }],
];
const TOTAL = 95;

/* ---------- player ---------- */
let cueIx = 0, ticker = null;
function start() {
  audioInit();
  $('#gate').style.display = 'none'; $('#hud').style.display = 'flex';
  t0 = AC.currentTime + .1; barCount = 0; cueIx = 0;
  musicTimer = setInterval(() => { // schedule one bar ahead
    if (t0 + barCount * SPB * 4 < AC.currentTime + 1.2) scheduleMusic();
  }, 200);
  ticker = setInterval(() => {
    const el = AC.currentTime - t0;
    $('#bar').style.width = Math.min(100, el / TOTAL * 100) + '%';
    while (cueIx < CUES.length && CUES[cueIx][0] <= el) { try { CUES[cueIx][1](); } catch (e) { console.error(e); } cueIx++; }
    if (el > TOTAL) { clearInterval(ticker); clearInterval(musicTimer); }
  }, 50);
}
$('#play').onclick = start;
$('#restart').onclick = () => location.reload();
$('#mus').onclick = (e) => { musicOn = !musicOn; musGain.gain.value = musicOn ? .5 : 0; e.target.textContent = musicOn ? 'music ✓' : 'music ✕'; };
$('#vox').onclick = (e) => { voiceOn = !voiceOn; if (!voiceOn) speechSynthesis.cancel(); e.target.textContent = voiceOn ? 'voice ✓' : 'voice ✕'; };
</script>
